<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
    <!-- Нет прямоугольного фона → прозрачность -->

    <!-- Круглая рамка с пейзажем -->
    <defs>
        <clipPath id="circleView">
            <circle cx="400" cy="400" r="350"/>
        </clipPath>
    </defs>

    <g clip-path="url(#circleView)">
        <!-- Небо -->
        <rect x="50" y="50" width="700" height="700" fill="#e0f7fa"/>

        <!-- Холмы -->
        <path d="M50,500 Q200,450 400,500 T750,500 V750 H50 Z" fill="#c8e6c9"/>
        <path d="M50,550 Q200,500 400,550 T750,550 V750 H50 Z" fill="#a5d6a7"/>

        <!-- Вилла -->
        <rect x="300" y="350" width="200" height="150" fill="#ffccbc"/>
        <path d="M290,350 L400,250 L510,350 Z" fill="#d84315"/>

        <!-- Кипарисы -->
        <path d="M480,350 L490,220 L500,350 Z" fill="#2e7d32"/>
        <path d="M520,350 L530,210 L540,350 Z" fill="#2e7d32"/>
        <path d="M260,380 L270,260 L280,380 Z" fill="#2e7d32"/>
    </g>

    <!-- Обводка круга -->
    <circle cx="400" cy="400" r="350" fill="none" stroke="#d4c4a8" stroke-width="8"/>
</svg>